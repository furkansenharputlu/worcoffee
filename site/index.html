<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WorCoffee — coffee places for remote workers</title>
  <meta name="description" content="A community-curated map of coffee shops, cafés, and spots that are great for remote work." />
  <meta property="og:title" content="WorCoffee" />
  <meta property="og:description" content="Coffee places for remote workers, by remote workers." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%98%95%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="wrap">
      <div class="lang-switch">
        <select id="lang" aria-label="Language">
          <option value="en">🇬🇧 English</option>
          <option value="tr">🇹🇷 Türkçe</option>
        </select>
      </div>
      <h1>☕ WorCoffee</h1>
      <p class="tag" data-i18n="tagline"></p>
      <p class="meta">
        <span id="stats" data-i18n="loading"></span> ·
        <a href="https://github.com/furkansenharputlu/worcoffee" target="_blank" rel="noopener" data-i18n="github"></a> ·
        <a href="#" id="open-form" data-i18n="add_place"></a>
      </p>
      <button type="button" id="open-form-btn" class="cta" data-i18n="add_place_btn"></button>
    </div>
  </header>

  <main class="wrap">
    <section class="filters">
      <input id="q" type="search" autocomplete="off" data-i18n-attr="placeholder:search_placeholder" />
      <select id="country"><option value="" data-i18n="all_countries"></option></select>
      <select id="city"><option value="" data-i18n="all_cities"></option></select>
      <select id="type">
        <option value="" data-i18n="all_types"></option>
        <option value="cafe" data-i18n="type_cafe"></option>
        <option value="coworking" data-i18n="type_coworking"></option>
        <option value="library" data-i18n="type_library"></option>
        <option value="study-spot" data-i18n="type_study_spot"></option>
        <option value="hotel-lobby" data-i18n="type_hotel_lobby"></option>
        <option value="restaurant" data-i18n="type_restaurant"></option>
        <option value="other" data-i18n="type_other"></option>
      </select>
    </section>

    <section id="results" class="grid"></section>

    <template id="card-tpl">
      <article class="card">
        <header>
          <h3 class="name"></h3>
          <span class="type"></span>
        </header>
        <p class="loc"></p>
        <p class="desc"></p>
        <ul class="ratings"></ul>
        <p class="tags"></p>
        <footer class="links"></footer>
        <p class="submitter"></p>
      </article>
    </template>
  </main>

  <footer class="site-foot">
    <div class="wrap">
      <p id="footer-text"></p>
      <p class="disclaimer">
        <strong data-i18n="disclaimer_title"></strong>
        <span data-i18n="disclaimer_text"></span>
        <a href="https://github.com/furkansenharputlu/worcoffee/blob/main/DISCLAIMER.md" target="_blank" rel="noopener" data-i18n="disclaimer_more"></a>
      </p>
      <p class="takedown">
        <span data-i18n="owner_question"></span>
        <a href="https://github.com/furkansenharputlu/worcoffee/blob/main/DISCLAIMER.md#-are-you-the-owner-of-a-place-listed-here" target="_blank" rel="noopener" data-i18n="owner_cta"></a>
      </p>
    </div>
  </footer>

  <dialog id="add-dialog" class="dialog">
    <form id="add-form" method="dialog">
      <header>
        <h2 data-i18n="form_title"></h2>
        <button type="button" class="close" id="close-form" aria-label="Close">×</button>
      </header>
      <a href="https://github.com/furkansenharputlu/worcoffee/blob/main/CONTRIBUTING.md" target="_blank" rel="noopener" class="dev-hint">
        <span class="ic" id="dev-hint-icon"></span>
        <span class="dev-hint-text">
          <strong data-i18n="dev_hint"></strong>
          <span data-i18n="dev_hint_sub"></span>
        </span>
        <span class="dev-hint-arrow">→</span>
      </a>
      <p class="intro" data-i18n="form_intro"></p>

      <label><span data-i18n="form_name"></span> <em data-i18n="form_required"></em>
        <input name="name" required />
      </label>
      <div class="row">
        <label><span data-i18n="form_country"></span> <em data-i18n="form_required"></em>
          <input name="country" required />
        </label>
        <label><span data-i18n="form_city"></span> <em data-i18n="form_required"></em>
          <input name="city" required />
        </label>
      </div>
      <label><span data-i18n="form_address"></span> <em data-i18n="form_required"></em>
        <input name="address" required />
      </label>
      <label><span data-i18n="form_type"></span> <em data-i18n="form_optional"></em>
        <select name="type">
          <option value=""></option>
          <option value="cafe" data-i18n="type_cafe"></option>
          <option value="coworking" data-i18n="type_coworking"></option>
          <option value="library" data-i18n="type_library"></option>
          <option value="study-spot" data-i18n="type_study_spot"></option>
          <option value="hotel-lobby" data-i18n="type_hotel_lobby"></option>
          <option value="restaurant" data-i18n="type_restaurant"></option>
          <option value="other" data-i18n="type_other"></option>
        </select>
      </label>
      <label><span data-i18n="form_description"></span> <em data-i18n="form_required"></em>
        <textarea name="description" rows="2" required></textarea>
      </label>

      <div class="ratings-grid">
        <label><span data-i18n="form_wifi"></span>
          <input type="number" name="wifi" min="1" max="5" required />
        </label>
        <label><span data-i18n="form_power"></span>
          <input type="number" name="power" min="1" max="5" required />
        </label>
        <label><span data-i18n="form_noise"></span>
          <input type="number" name="noise" min="1" max="5" required />
        </label>
        <label><span data-i18n="form_comfort"></span>
          <input type="number" name="comfort" min="1" max="5" required />
        </label>
      </div>

      <label><span data-i18n="form_maps"></span> <em data-i18n="form_required"></em>
        <input name="maps" type="url" placeholder="https://maps.google.com/…" required />
      </label>
      <label><span data-i18n="form_instagram"></span> <em data-i18n="form_optional"></em>
        <input name="instagram" type="url" placeholder="https://instagram.com/…" />
      </label>
      <label><span data-i18n="form_website"></span> <em data-i18n="form_optional"></em>
        <input name="website" type="url" placeholder="https://…" />
      </label>
      <fieldset class="submitter">
        <legend><span data-i18n="form_your_handle"></span> <em data-i18n="form_optional"></em></legend>
        <div class="radios">
          <label class="radio"><input type="radio" name="submitter_platform" value="instagram" checked /> <span>Instagram</span></label>
          <label class="radio"><input type="radio" name="submitter_platform" value="github" /> <span>GitHub</span></label>
          <label class="radio"><input type="radio" name="submitter_platform" value="other" /> <span data-i18n="form_other"></span></label>
        </div>
        <input name="submitter" placeholder="@kullanici" />
      </fieldset>

      <footer class="actions">
        <button type="button" id="cancel-form" data-i18n="form_close"></button>
        <button type="submit" class="primary" data-i18n="form_submit"></button>
      </footer>
    </form>
  </dialog>

  <div id="toast" class="toast" hidden></div>

  <script src="i18n.js"></script>
  <script src="icons.js"></script>
  <script src="app.js"></script>
</body>
</html>
